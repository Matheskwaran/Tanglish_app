<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Tanglish Tamil Translator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/auth.css" />

</head>
<body>

<div class="page auth-page active">
  <div class="kolam-deco"></div><div class="kolam-deco"></div>
  <div class="kolam-deco"></div><div class="kolam-deco"></div>
  <div class="kolam-deco"></div><div class="kolam-deco"></div>

  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-icon" style="font-size:22px"><i class="fa fa-lock"></i></div>
      <h1>Reset Password</h1>
      <p>We'll send a reset link to your email</p>
    </div>

    <h2>Forgot Password?</h2>
    <p class="subtitle">Enter your registered email address below</p>

    <form onsubmit="event.preventDefault(); doForgot();">
      <div style="margin-bottom:20px">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="forgot-email" placeholder="yourname@example.com" />
        <div class="field-error" id="err-forgot-email">Please enter a valid email</div>
      </div>

      <button type="submit" class="btn-primary-auth">
        <i class="fa fa-paper-plane" style="margin-right:8px"></i>Send Reset Link
      </button>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <div class="auth-footer">
      Remembered it? <a href="login.html" class="auth-link">Back to Login</a>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
