<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Tanglish Tamil Translator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <style>

    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:480px){ .row { grid-template-columns:1fr; } }
  </style>
</head>
<body>

<div class="page auth-page active">
  <div class="kolam-deco"></div><div class="kolam-deco"></div>
  <div class="kolam-deco"></div><div class="kolam-deco"></div>
  <div class="kolam-deco"></div><div class="kolam-deco"></div>

  <div class="auth-card" style="max-width:480px">
    <div class="auth-brand">
      <div class="brand-icon">த</div>
      <h1>Tanglish → Tamil</h1>
      <p>NLP Translation Platform</p>
    </div>

    <h2>Create Account</h2>
    <p class="subtitle">Join to start translating Tanglish to Tamil</p>

    <form onsubmit="event.preventDefault(); doSignup();">
      <!-- Row: Full Name + Username -->
      <div class="row" style="margin-bottom:12px">
        <div>
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="su-name" placeholder="Arjun Kumar" />
          <div class="field-error" id="err-su-name">Enter your full name</div>
        </div>
        <div>
          <label class="form-label">Username</label>
          <input type="text" class="form-control" id="su-uname" placeholder="arjun_k" />
          <div class="field-error" id="err-su-uname">Enter a username</div>
        </div>
      </div>

      <!-- Email -->
      <div style="margin-bottom:12px">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="su-email" placeholder="arjun@example.com" />
        <div class="field-error" id="err-su-email">Enter a valid email</div>
      </div>

      <!-- Password -->
      <div style="margin-bottom:12px">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input type="password" class="form-control" id="su-pass" placeholder="Min. 8 characters" />
          <span class="input-group-text" onclick="togglePass('su-pass',this)"><i class="fa fa-eye-slash"></i></span>
        </div>
        <div class="field-error" id="err-su-pass">Password must be at least 8 characters</div>
      </div>

      <!-- Confirm Password -->
      <div style="margin-bottom:20px">
        <label class="form-label">Confirm Password</label>
        <div class="input-group">
          <input type="password" class="form-control" id="su-confirm" placeholder="Re-enter password" />
          <span class="input-group-text" onclick="togglePass('su-confirm',this)"><i class="fa fa-eye-slash"></i></span>
        </div>
        <div class="field-error" id="err-su-confirm">Passwords do not match</div>
      </div>

      <button type="submit" class="btn-primary-auth">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html" class="auth-link">Sign In</a>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
